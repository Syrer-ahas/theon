<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tactical Web — Blog</title>
    <meta name="description" content="Internal blog post template for Tactical Web." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #060814;
        --surface: rgba(12, 17, 31, 0.82);
        --border: rgba(255,255,255,0.16);
        --text: #f6f7ff;
        --muted: #93a2c1;
        --accent: #8d7dff;
        --accent-2: #52d5ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', system-ui, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top left, rgba(141,125,255,0.16), transparent 24%), linear-gradient(135deg, #070b17 0%, #0b1227 42%, #060814 100%);
      }
      a { color: inherit; text-decoration: none; }
      .container { width: min(1100px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 48px; }
      .panel {
        background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
        border: 1px solid var(--border);
        border-radius: 24px;
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 60px rgba(0,0,0,0.18);
      }
      .nav { display:flex; justify-content:space-between; align-items:center; padding: 8px 0 18px; gap: 12px; }
      .brand { display:flex; align-items:center; gap:12px; font-family:'Manrope',sans-serif; font-weight:800; }
      .brand-logo { width:48px; height:48px; border-radius:0; object-fit:cover; border:0; box-shadow:none; }
      .nav-actions { display:flex; gap:12px; flex-wrap:wrap; }
      .btn, button {
        border: 0;
        border-radius: 20px;
        padding: 12px 18px;
        font-family: 'Manrope', sans-serif;
        font-weight: 800;
        cursor: pointer;
        color: white;
        transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn:hover, button:hover { transform: translateY(-2px); filter: brightness(1.04); }
      .btn-primary {
        background: linear-gradient(180deg, #fff7e6 0%, #ffe7b2 60%);
        color: #2e1a07;
        padding: 10px 24px;
        border-radius: 22px;
        border: 1px solid rgba(0,0,0,0.16);
        box-shadow: 0 10px 30px rgba(6,8,12,0.78), 0 0 18px rgba(90,60,20,0.20), inset 0 1px 0 rgba(255,255,255,0.7);
        font-weight: 900;
        letter-spacing: 0.01em;
        outline: 0;
      }
      .btn-secondary { background: linear-gradient(180deg, rgba(255,240,245,0.98), rgba(250,210,235,0.9)); color:#3a1f2b; box-shadow: 0 8px 22px rgba(6,8,12,0.7), 0 0 18px rgba(140,80,110,0.12); border:1px solid rgba(0,0,0,0.12); }
      .btn-ghost { background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); color: var(--text); box-shadow:0 6px 18px rgba(6,8,12,0.55); }
      .btn-yellow { background: linear-gradient(180deg, #fff8c8 0%, #ffd96b 70%); color: #4a2a04; border:1px solid rgba(84,54,12,0.16); box-shadow: 0 8px 22px rgba(255,188,40,0.18); }
      .hero { padding: 24px 28px; margin-bottom: 18px; }
      .eyebrow { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); font-size:0.9rem; font-weight:700; margin-bottom: 12px; color:#e8ebff; }
      h1,h2,h3 { font-family:'Manrope',sans-serif; margin:0; }
      h1 { font-size: clamp(2rem, 3vw, 2.8rem); line-height: 1.08; margin-bottom: 12px; }
      .muted { color: var(--muted); line-height: 1.7; }
      .card { padding: 18px; border-radius: 18px; background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); }
      .template-box { margin-top: 14px; padding: 16px; border-radius: 16px; background: rgba(6,10,20,0.78); border:1px solid rgba(255,255,255,0.08); overflow:auto; }
      pre { margin:0; white-space: pre-wrap; font-family:'Consolas',monospace; color:#e7f5ff; }
      .footer-note { margin-top: 12px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="panel hero" style="min-height: 60vh; display:grid; place-items:center; text-align:center;">
        <div>
          <h1 style="font-size: clamp(3rem, 8vw, 5rem); letter-spacing: 0.08em;">BLOGS</h1>
        </div>
      </section>
    </div>

    <script src="cookie.js"></script>
    <script src="countdown.js"></script>
  </body>
</html>
