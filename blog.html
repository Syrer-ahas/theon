<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Tactical Web — Blog</title><meta name="description" content="News, updates, and preset stories from Tactical Web."><link rel="icon" type="image/png" href="images/logo.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--text:#f6f7ff;--muted:#93a2c1;--border:rgba(255,255,255,.16);--accent:#8d7dff}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(141,125,255,.16),transparent 24%),linear-gradient(135deg,#070b17,#0b1227 42%,#060814)}a{color:inherit;text-decoration:none}.container{width:min(1100px,calc(100% - 32px));margin:auto;padding:24px 0 48px}.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 0 18px}.brand{display:flex;align-items:center;gap:12px;font:800 1rem Manrope,sans-serif}.brand img{width:48px;height:48px;object-fit:cover}.btn,button{border:0;border-radius:20px;padding:11px 18px;font:800 .9rem Manrope,sans-serif;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}.btn-primary{background:linear-gradient(180deg,#fff7e6,#ffe7b2 60%);color:#2e1a07}.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:var(--text)}.panel{background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--border);border-radius:24px;box-shadow:0 18px 60px rgba(0,0,0,.18)}.hero{padding:30px;margin-bottom:18px}.eyebrow,.chip{display:inline-flex;align-items:center;border-radius:999px;font-weight:700}.eyebrow{padding:8px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:.85rem}h1,h2,h3{font-family:Manrope,sans-serif;margin:0}h1{font-size:clamp(2.25rem,6vw,4rem);margin:12px 0}.muted{color:var(--muted);line-height:1.7}.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:20px}.filters{display:flex;gap:8px;flex-wrap:wrap}.filter{background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(255,255,255,.12);padding:8px 12px}.filter.active{background:#8d7dff;border-color:#aaa0ff}.post-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.post-card{padding:0;overflow:hidden;cursor:pointer;transition:transform .18s ease,border-color .18s ease}.post-card:hover{transform:translateY(-4px);border-color:rgba(141,125,255,.7)}.post-card img{width:100%;height:190px;object-fit:cover;display:block}.content{padding:17px;display:grid;gap:9px}.chip-row{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:5px 8px;background:rgba(82,213,255,.12);color:#9de3ff;font-size:.76rem}.empty{padding:36px;text-align:center;grid-column:1/-1}.modal{position:fixed;inset:0;background:rgba(5,8,16,.78);backdrop-filter:blur(8px);display:grid;place-items:center;padding:20px;z-index:1800}.modal.hidden{display:none}.modal-card{width:min(860px,100%);max-height:90vh;overflow:auto;border-radius:24px;background:rgba(16,23,41,.97);border:1px solid var(--border);box-shadow:0 24px 70px rgba(0,0,0,.4);padding:24px}.modal-card img{width:100%;max-height:280px;object-fit:cover;border-radius:16px;margin:16px 0}.close-btn{float:right;background:rgba(255,255,255,.08);color:white;padding:8px 12px}.article-content p{color:var(--muted);line-height:1.85;margin:0 0 12px}@media(max-width:700px){.post-grid{grid-template-columns:1fr}.nav{align-items:flex-start}.toolbar{align-items:flex-start;flex-direction:column}}
  </style>
<link rel="stylesheet" href="newsletter-popup.css"></head>
<body><div class="container"><nav class="nav"><a class="brand" href="index.html"><img src="images/logo.png" alt="Tactical Web logo"><span>Tactical Web</span></a><div data-site-nav><div style="position:relative;display:flex;gap:8px"><a class="btn btn-primary" href="generator.html">Start building</a><button class="btn btn-ghost" data-nav-toggle aria-expanded="false" type="button" style="padding:8px 10px">▾</button><div data-nav-menu hidden style="position:absolute;right:0;top:calc(100% + 10px);min-width:190px;padding:10px;border:1px solid var(--border);border-radius:20px;background:#101728;box-shadow:0 14px 44px rgba(0,0,0,.45);z-index:12000"><a class="btn btn-ghost" href="pro.html" style="display:block;width:100%;text-align:left;margin:6px 0">Get Pro</a><a class="btn btn-ghost" href="account.html" style="display:block;width:100%;text-align:left;margin:6px 0">Account settings</a><a class="btn btn-ghost" href="index.html" style="display:block;width:100%;text-align:left;margin:6px 0">Landing</a></div></div></div></nav><main><section class="panel hero"><span class="eyebrow">✦ Tactical dispatch</span><h1>News, releases, and preset stories.</h1><p class="muted">Add or edit articles in the clearly marked <code>posts</code> array inside this HTML file. Visitors can filter the feed and open every post in a focused reader.</p><div class="toolbar"><div class="filters" id="filters"></div><span class="muted" id="postCount"></span></div></section><section class="post-grid" id="postGrid"></section></main></div><div class="modal hidden" id="postModal" role="dialog" aria-modal="true" aria-label="Blog post"><div class="modal-card"><button class="close-btn" id="closeModalBtn" type="button">Close</button><div id="modalContent"></div></div></div><script src="site-nav.js"></script><script>
// BLOG CONTENT: Add new blogs/news by copying one object in this array.
const posts=[
  {id:'welcome-post',title:'Welcome to Tactical Web',description:'A short introduction to the Tactical Web preset workflow.',readingTime:'3 min read',category:'News',image:'images/rdr2.png',date:'2026-07-11',author:'Tactical Web',content:['This is the first article placeholder. Replace it with your own content.','Each item in the posts array becomes a card automatically, so you only need to update the article details above.']}
];
const postGrid=document.getElementById('postGrid'),filters=document.getElementById('filters'),postCount=document.getElementById('postCount'),modal=document.getElementById('postModal'),modalContent=document.getElementById('modalContent');let activeCategory='All';
const escapeHtml=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
function renderFilters(){const categories=['All',...new Set(posts.map(post=>post.category).filter(Boolean))];filters.innerHTML='';categories.forEach(category=>{const button=document.createElement('button');button.className=`filter ${category===activeCategory?'active':''}`;button.textContent=category;button.onclick=()=>{activeCategory=category;renderFilters();renderPosts()};filters.appendChild(button)})}
function renderPosts(){const visible=posts.filter(post=>activeCategory==='All'||post.category===activeCategory);postCount.textContent=`${visible.length} ${visible.length===1?'post':'posts'}`;postGrid.innerHTML=visible.length?'':'<div class="panel empty"><h2>No posts in this category yet.</h2><p class="muted">Check back soon for a new dispatch.</p></div>';visible.forEach(post=>{const card=document.createElement('article');card.className='panel post-card';card.tabIndex=0;card.innerHTML=`<img src="${escapeHtml(post.image)}" alt="${escapeHtml(post.title)}"><div class="content"><div class="chip-row"><span class="chip">${escapeHtml(post.category)}</span><span class="chip">${escapeHtml(post.readingTime)}</span></div><h3>${escapeHtml(post.title)}</h3><p class="muted">${escapeHtml(post.description)}</p><div class="chip-row"><span class="chip">${escapeHtml(post.date)}</span><span class="chip">by ${escapeHtml(post.author)}</span></div></div>`;card.onclick=()=>openPost(post);card.onkeydown=event=>{if(event.key==='Enter'||event.key===' '){event.preventDefault();openPost(post)}};postGrid.appendChild(card)})}
function openPost(post){modalContent.innerHTML=`<span class="eyebrow">${escapeHtml(post.category)}</span><h2 style="margin-top:12px">${escapeHtml(post.title)}</h2><div class="chip-row" style="margin:12px 0"><span class="chip">${escapeHtml(post.readingTime)}</span><span class="chip">${escapeHtml(post.date)}</span><span class="chip">by ${escapeHtml(post.author)}</span></div><img src="${escapeHtml(post.image)}" alt="${escapeHtml(post.title)}"><div class="article-content">${(post.content||[]).map(paragraph=>`<p>${escapeHtml(paragraph)}</p>`).join('')}</div>`;modal.classList.remove('hidden');document.getElementById('closeModalBtn').focus()}
function closeModal(){modal.classList.add('hidden')}document.getElementById('closeModalBtn').onclick=closeModal;modal.onclick=event=>{if(event.target===modal)closeModal()};document.addEventListener('keydown',event=>{if(event.key==='Escape')closeModal()});renderFilters();renderPosts();
</script><script src="newsletter-popup.js"></script></body></html>
