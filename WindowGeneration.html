<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Tactical Web — AI Agent Chat</title><link rel="icon" type="image/png" href="images/logo.png"><meta name="description" content="Chat with the Tactical Web AI Agent."><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--text:#f6f7ff;--muted:#92a0bf;--border:rgba(255,255,255,.16);--accent:#8b7cff;--accent-2:#50d4ff;--success:#4fe6a2;--bg:#060814;--surface:rgba(16,23,40,.96)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(141,125,255,.22),transparent 24%),radial-gradient(circle at 80% 0%,rgba(82,213,255,.2),transparent 20%),linear-gradient(135deg,#0d1429,#121c3a 42%,#0b1227)}body::before{content:'';position:fixed;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.13),transparent 24%,transparent 78%,rgba(255,255,255,.05));pointer-events:none;mask-image:linear-gradient(180deg,rgba(0,0,0,.95),transparent)}a{color:inherit;text-decoration:none}.container{width:min(1200px,calc(100% - 32px));margin:0 auto;padding:24px 0 52px}.topbar{display:flex;justify-content:space-between;align-items:center;padding:6px 0 24px;max-width:1200px;margin:0 auto}.brand{display:flex;align-items:center;gap:12px;font:800 1rem Manrope,sans-serif}.brand img{width:48px;height:48px;object-fit:cover}.nav-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:22px;padding:12px 18px;font:800 .9rem Manrope,sans-serif;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .18s ease,filter .18s ease}.btn:hover{transform:translateY(-2px);filter:brightness(1.04)}.btn-primary{background:linear-gradient(180deg,#fff7e6,#ffe7b2 60%);color:#2e1a07;padding:10px 24px;border:1px solid rgba(0,0,0,.16);box-shadow:0 10px 30px rgba(6,8,12,.78),0 0 18px rgba(90,60,20,.2),inset 0 1px 0 rgba(255,255,255,.7)}.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text);box-shadow:0 6px 18px rgba(6,8,12,.55)}.btn-download{background:linear-gradient(180deg,#4fe6a2,#2db87a);color:#0a2e1b;border:1px solid rgba(79,230,162,.3);box-shadow:0 8px 22px rgba(6,8,12,.55),0 0 18px rgba(79,230,162,.12)}.panel{background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--border);border-radius:24px;backdrop-filter:blur(18px);box-shadow:0 18px 50px rgba(0,0,0,.2);position:relative;overflow:hidden}.panel::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1px;background:linear-gradient(110deg,rgba(255,255,255,.35),rgba(255,255,255,.05),rgba(255,255,255,.2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}.chat-wrapper{max-width:960px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:0;min-height:82vh;border-radius:28px}.chat-header{padding:18px 28px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border)}.chat-header .status-group{display:flex;align-items:center;gap:9px}.chat-header .status-dot{width:10px;height:10px;border-radius:50%;background:var(--success);display:inline-block;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px rgba(79,230,162,.4)}.chat-header h2{margin:0;font:800 1.2rem Manrope,sans-serif;letter-spacing:-.02em}.chat-header .model-badge{background:rgba(80,212,255,.1);border:1px solid rgba(80,212,255,.2);border-radius:999px;padding:5px 12px;font-size:.75rem;font-weight:700;color:#9fe2ff}.chat-header .header-time{color:var(--muted);font-size:.82rem;margin-left:auto;opacity:.7}.chat-messages{flex:1;padding:24px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;min-height:480px;max-height:58vh;scroll-behavior:smooth}.chat-messages::-webkit-scrollbar{width:6px}.chat-messages::-webkit-scrollbar-track{background:transparent}.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:999px}.chat-messages::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}.message{display:flex;gap:14px;width:100%;animation:msgIn .25s ease-out}.message.agent{justify-content:flex-start}.message.user{justify-content:flex-end}.message .avatar-wrap{display:flex;align-items:flex-end;flex-shrink:0}.message .avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font:800 .82rem Manrope,sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.3);flex-shrink:0}.message.agent .avatar{background:linear-gradient(180deg,#204f88,#12345f);border:1px solid rgba(138,190,255,.25)}.message.user .avatar{background:linear-gradient(180deg,#8b7cff,#6b5ce0);border:1px solid rgba(141,125,255,.35)}.message .bubble-wrap{display:flex;flex-direction:column;max-width:78%}.message.user .bubble-wrap{align-items:flex-end}.message .bubble{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:14px 18px;font-size:.95rem;line-height:1.7;color:#edf2ff;box-shadow:0 2px 12px rgba(0,0,0,.12);white-space:pre-wrap;width:fit-content}.message.agent .bubble{border-bottom-left-radius:6px}.message.user .bubble{background:rgba(141,125,255,.16);border-color:rgba(141,125,255,.25);border-bottom-right-radius:6px}.message .bubble .msg-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:7px;border-top:1px solid rgba(255,255,255,.06);gap:12px}.message .bubble .msg-time{font-size:.7rem;color:var(--muted);white-space:nowrap}.message .bubble .msg-status{font-size:.7rem;color:var(--success);white-space:nowrap}.chat-input-row{display:flex;gap:10px;padding:18px 28px;border-top:1px solid var(--border);align-items:center}.chat-input-row .input-wrap{flex:1;position:relative;display:flex;align-items:center}.chat-input-row input{width:100%;min-width:0;padding:14px 18px;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(7,11,22,.85);color:var(--text);font:inherit;outline:0;transition:border-color .2s ease;font-size:.95rem}.chat-input-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(141,125,255,.15)}.chat-input-row input::placeholder{color:var(--muted);opacity:.6}.chat-input-row .btn-send{background:linear-gradient(180deg,#204f88,#12345f);border:1px solid rgba(138,190,255,.25);color:#fff;padding:14px 26px;border-radius:16px;font:800 .88rem Manrope,sans-serif;cursor:pointer;transition:transform .18s ease,filter .18s ease;white-space:nowrap}.chat-input-row .btn-send:hover{transform:translateY(-1px);filter:brightness(1.08)}.chat-input-row .btn-send:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}.chat-input-row .char-count{position:absolute;right:14px;bottom:9px;font-size:.7rem;color:var(--muted);pointer-events:none;opacity:.5}.chat-placeholder{display:grid;place-items:center;min-height:480px;color:var(--muted);text-align:center;padding:40px 28px}.chat-placeholder .placeholder-icon{width:64px;height:64px;border-radius:50%;background:linear-gradient(180deg,#204f88,#12345f);border:1px solid rgba(138,190,255,.2);display:grid;place-items:center;margin:0 auto 20px;box-shadow:0 6px 24px rgba(0,0,0,.35),0 0 20px rgba(141,125,255,.08)}.chat-placeholder .placeholder-icon svg{width:32px;height:32px;fill:var(--accent-2)}.chat-placeholder h3{margin:0 0 8px;font-family:Manrope,sans-serif;color:var(--text);font-size:1.4rem;letter-spacing:-.02em}.chat-placeholder p{margin:0 0 22px;font-size:.93rem;max-width:420px;line-height:1.6}.chat-placeholder .suggestions{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:520px}.chat-placeholder .suggestions button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:9px 16px;color:var(--muted);font-size:.84rem;cursor:pointer;transition:all .2s ease;font-family:inherit}.chat-placeholder .suggestions button:hover{background:rgba(141,125,255,.15);border-color:rgba(141,125,255,.3);color:var(--text);transform:translateY(-1px)}.agent-btn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(138,190,255,.25);background:linear-gradient(180deg,#204f88,#12345f);color:#fff;cursor:pointer;display:grid;place-items:center;padding:0;transition:transform .18s ease,box-shadow .18s ease;box-shadow:0 4px 14px rgba(0,0,0,.35),0 0 12px rgba(141,125,255,.15)}.agent-btn:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(0,0,0,.4),0 0 18px rgba(141,125,255,.3)}.agent-btn svg{width:22px;height:22px;fill:currentColor}.typing-indicator{display:flex;align-items:center;gap:5px;padding:5px 0}.typing-indicator span{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:typing 1.4s ease-in-out infinite}.typing-indicator span:nth-child(2){animation-delay:.2s}.typing-indicator span:nth-child(3){animation-delay:.4s}.error-msg{color:#f87171;font-size:.85rem;padding:10px 18px;text-align:center;border:1px solid rgba(248,113,113,.2);border-radius:12px;background:rgba(248,113,113,.08);margin:4px 28px;align-self:center;width:100%}.gen-banner{padding:16px 22px;margin:8px 0;border-radius:16px;background:rgba(79,230,162,.08);border:1px solid rgba(79,230,162,.2);text-align:center;color:var(--success);font-size:.9rem}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}@media(max-width:768px){.chat-wrapper{min-height:70vh}.chat-messages{min-height:380px;max-height:48vh;padding:16px 16px}.chat-header{padding:14px 16px}.chat-input-row{padding:12px 16px;flex-wrap:wrap}.chat-input-row .btn-send{width:100%}.message .bubble-wrap{max-width:92%}.message .bubble{font-size:.9rem;padding:12px 14px}.chat-placeholder{padding:30px 16px;min-height:380px}.chat-placeholder .suggestions button{font-size:.78rem}}
  </style>

<body><div class="container"><div class="topbar"><a class="brand" href="index.html"><img src="images/logo.png" alt="Tactical Web logo"><span>Tactical Web</span></a><div class="nav-actions" id="navActions"></div></div><section class="panel chat-wrapper"><div class="chat-header"><div class="status-group"><span class="status-dot"></span><h2>AI Agent</h2></div><span class="model-badge">Gemini + Groq</span><span class="header-time" id="headerTime"></span></div><div id="chatArea"><div class="chat-placeholder" id="chatPlaceholder"><div><div class="placeholder-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-3-9.5c0-.83-.67-1.5-1.5-1.5S6 9.67 6 10.5 6.67 12 7.5 12 9 11.33 9 10.5zm9 0c0-.83-.67-1.5-1.5-1.5S15 9.67 15 10.5 15.67 12 16.5 12 18 11.33 18 10.5zM12 17c2.33 0 4.31-1.46 5.11-3.5H6.89C7.69 15.54 9.67 17 12 17z"/></svg></div><h3>Chat with the Tactical AI Agent</h3><p>Gemini handles the conversation, Groq generates your presets. Ask for advice or request a custom preset!</p><div class="suggestions"><button data-suggestion="Create a cinematic night preset for Cyberpunk 2077">🎬 Cinematic Night Preset</button><button data-suggestion="How do I optimize ReShade for Elden Ring?">⚔️ Elden Ring Optimization</button><button data-suggestion="Generate a vibrant preset for my high-end PC">🎨 Vibrant Preset</button><button data-suggestion="Make a warm sunset preset for RDR2 on mid-range PC">🌅 RDR2 Sunset Look</button></div></div></div><div id="chatMessages" class="chat-messages" style="display:none"></div></div><div class="chat-input-row" id="chatInputRow" style="display:none"><div class="input-wrap"><input id="chatInput" type="text" placeholder="Message the AI agent..." maxlength="1000"><span class="char-count" id="charCount">0/1000</span></div><button class="btn-send" id="sendBtn" type="button">Send</button></div></section></div><script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="auth-config.js"></script>
<script src="auth-session.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<script>
(function(){
  const session = window.TacticalAuth && window.TacticalAuth.getSession();
  const navActions = document.getElementById('navActions');
  const chatPlaceholder = document.getElementById('chatPlaceholder');
  const chatMessages = document.getElementById('chatMessages');
  const chatInputRow = document.getElementById('chatInputRow');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const charCount = document.getElementById('charCount');
  const headerTime = document.getElementById('headerTime');

  var svgHtml = '<svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-3-9.5c0-.83-.67-1.5-1.5-1.5S6 9.67 6 10.5 6.67 12 7.5 12 9 11.33 9 10.5zm9 0c0-.83-.67-1.5-1.5-1.5S15 9.67 15 10.5 15.67 12 16.5 12 18 11.33 18 10.5zM12 17c2.33 0 4.31-1.46 5.11-3.5H6.89C7.69 15.54 9.67 17 12 17z"/></svg>';

  headerTime.textContent = new Date().toLocaleDateString();
  var conversationHistory = [];

  if (session) {
    var agentBtn = document.createElement('button');
    agentBtn.className = 'agent-btn';
    agentBtn.setAttribute('aria-label', 'Open AI Agent Chat');
    agentBtn.setAttribute('title', 'Chat with AI Agent');
    agentBtn.innerHTML = svgHtml;
    agentBtn.addEventListener('click', function() {
      chatPlaceholder.style.display = 'none';
      chatMessages.style.display = 'flex';
      chatInputRow.style.display = 'flex';
      chatInput.focus();
      if (chatMessages.children.length === 0) {
        addMessage('agent', 'Hello! I\'m Tactical AI — I use Gemini for conversation and Groq to generate presets. Ask me anything about ReShade, or tell me what preset you want and I\'ll build it!');
      }
    });
    navActions.appendChild(agentBtn);
  }

  function addMessage(role, text, extra) {
    var div = document.createElement('div');
    div.className = 'message ' + role;
    var avatarWrap = document.createElement('div');
    avatarWrap.className = 'avatar-wrap';
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'agent' ? 'AI' : 'U';
    avatarWrap.appendChild(avatar);
    var bubbleWrap = document.createElement('div');
    bubbleWrap.className = 'bubble-wrap';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    var textNode = document.createTextNode(text);
    bubble.appendChild(textNode);
    if (extra) {
      var extraEl = document.createElement('div');
      extraEl.style.cssText = 'margin-top:12px;padding-top:10px;border-top:1px solid rgba(79,230,162,.2)';
      extraEl.innerHTML = extra;
      bubble.appendChild(extraEl);
    }
    var footer = document.createElement('div');
    footer.className = 'msg-footer';
    var time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    footer.appendChild(time);
    if (role === 'agent') {
      var status = document.createElement('span');
      status.className = 'msg-status';
      status.textContent = '✓ delivered';
      footer.appendChild(status);
    }
    bubble.appendChild(footer);
    bubbleWrap.appendChild(bubble);
    if (role === 'agent') {
      div.appendChild(avatarWrap);
      div.appendChild(bubbleWrap);
    } else {
      div.appendChild(bubbleWrap);
      div.appendChild(avatarWrap);
    }
    var typingEl = chatMessages.querySelector('.typing-indicator');
    if (typingEl) typingEl.remove();
    var errEl = chatMessages.querySelector('.error-msg');
    if (errEl) errEl.remove();
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showTyping() {
    var div = document.createElement('div');
    div.className = 'message agent';
    var avatarWrap = document.createElement('div');
    avatarWrap.className = 'avatar-wrap';
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';
    avatarWrap.appendChild(avatar);
    var bubbleWrap = document.createElement('div');
    bubbleWrap.className = 'bubble-wrap';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.style.cssText = 'padding:14px 18px 10px;border-bottom-left-radius:6px';
    var typingDiv = document.createElement('div');
    typingDiv.className = 'typing-indicator';
    for (var i = 0; i < 3; i++) {
      var dot = document.createElement('span');
      typingDiv.appendChild(dot);
    }
    bubble.appendChild(typingDiv);
    bubbleWrap.appendChild(bubble);
    div.appendChild(avatarWrap);
    div.appendChild(bubbleWrap);
    div.id = 'typingMsg';
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showError(msg) {
    var errEl = chatMessages.querySelector('.error-msg');
    if (errEl) errEl.remove();
    var typingMsg = document.getElementById('typingMsg');
    if (typingMsg) typingMsg.remove();
    var div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = msg;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  async function callGenerate(params) {
    showTyping();
    try {
      var resp = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          game: params.game || 'Cyberpunk 2077',
          style: params.style || 'cinematic',
          hardware: params.hardware || 'mid',
          prompt: params.prompt || 'custom preset',
          presetName: params.presetName || 'Tactical Preset'
        })
      });
      var data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Generation failed.');
      
      // Build .zip
      var zip = new JSZip();
      zip.file('preset.ini', data.preset_ini);
      zip.file('shader.fx', data.shader_fx);
      zip.file('README.txt', data.readme);
      var blob = await zip.generateAsync({ type: 'blob' });
      var url = URL.createObjectURL(blob);
      var filename = data.presetName.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-package.zip';
      
      var typingMsg = document.getElementById('typingMsg');
      if (typingMsg) typingMsg.remove();
      
      addMessage('agent', '✅ Your preset package is ready! Click below to download:', 
        '<a class="btn btn-download" href="' + url + '" download="' + filename + '" style="display:inline-flex;padding:10px 20px;text-decoration:none;font-weight:800;border-radius:14px">⬇ Download Preset Package</a>');
    } catch (err) {
      showError(err.message || 'Generation failed.');
    } finally {
      chatInput.disabled = false;
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
      chatInput.focus();
    }
  }

  async function handleSend() {
    var text = chatInput.value.trim();
    if (!text || sendBtn.disabled) return;
    if (text.length > 1000) {
      showError('Message is too long (max 1000 characters).');
      return;
    }
    addMessage('user', text);
    conversationHistory.push({ role: 'user', text: text });
    chatInput.value = '';
    charCount.textContent = '0/1000';
    chatInput.disabled = true;
    sendBtn.disabled = true;
    sendBtn.textContent = '...';
    showTyping();

    try {
      var response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: conversationHistory.slice(-10) })
      });
      var data = await response.json();
      if (!response.ok || (!data.reply && !data.generate)) {
        throw new Error(data.error || 'AI request failed.');
      }
      
      var typingMsg = document.getElementById('typingMsg');
      if (typingMsg) typingMsg.remove();
      
      conversationHistory.push({ role: 'model', text: data.reply });
      addMessage('agent', data.reply || 'Let me generate that preset for you...');
      
      // If Gemini signaled a generation, call Groq
      if (data.generate) {
        setTimeout(function() {
          callGenerate(data.generate);
        }, 500);
      }
    } catch (err) {
      showError(err.message || 'Something went wrong. Please try again.');
    } finally {
      chatInput.disabled = false;
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
      chatInput.focus();
    }
  }

  document.querySelectorAll('[data-suggestion]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      chatInput.value = this.getAttribute('data-suggestion');
      charCount.textContent = chatInput.value.length + '/1000';
      chatPlaceholder.style.display = 'none';
      chatMessages.style.display = 'flex';
      chatInputRow.style.display = 'flex';
      handleSend();
    });
  });

  sendBtn.addEventListener('click', handleSend);
  chatInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
  chatInput.addEventListener('input', function() {
    charCount.textContent = this.value.length + '/1000';
  });
})();
</script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
