<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔥 Something Epic Is Coming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated Background ── */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 215, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            animation: gridPulse 6s ease-in-out infinite;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .bg-orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 20s ease-in-out infinite;
            pointer-events: none;
        }
        .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.12), transparent);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }
        .orb:nth-child(2) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 100, 50, 0.10), transparent);
            bottom: -10%;
            right: -10%;
            animation-delay: -7s;
        }
        .orb:nth-child(3) {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(100, 200, 255, 0.08), transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 40px) scale(0.9); }
        }

        /* ── Scanning line ── */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.6), transparent);
            z-index: 1;
            animation: scanDown 4s linear infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        @keyframes scanDown {
            0% { top: -2px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* ── Main Container ── */
        .countdown-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 30px;
            max-width: 850px;
            width: 100%;
        }

        /* ── Pre-header badge ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 100px;
            padding: 8px 24px 8px 18px;
            margin-bottom: 30px;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 215, 0, 0.7);
            animation: badgePulse 3s ease-in-out infinite;
        }
        .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffd700;
            animation: dotBlink 1.4s ease-in-out infinite;
            box-shadow: 0 0 10px #ffd700;
        }
        @keyframes dotBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }
        @keyframes badgePulse {
            0%, 100% { border-color: rgba(255, 215, 0, 0.2); }
            50% { border-color: rgba(255, 215, 0, 0.5); }
        }

        /* ── Main Title ── */
        .title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(28px, 5vw, 56px);
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffd700 0%, #ff6b35 50%, #ffd700 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: clamp(14px, 2vw, 20px);
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 50px;
            font-weight: 300;
        }
        .subtitle span {
            color: rgba(255, 215, 0, 0.6);
        }

        /* ── Countdown Tiles ── */
        .timer {
            display: flex;
            justify-content: center;
            gap: clamp(12px, 3vw, 30px);
            flex-wrap: wrap;
        }

        .timer-unit {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tile {
            position: relative;
            width: clamp(80px, 14vw, 160px);
            height: clamp(90px, 16vw, 170px);
            background: linear-gradient(180deg,
                rgba(20, 20, 30, 0.9) 0%,
                rgba(10, 10, 18, 0.95) 50%,
                rgba(5, 5, 12, 1) 100%);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 215, 0, 0.1);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .tile:hover {
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow:
                0 8px 40px rgba(0, 0, 0, 0.8),
                0 0 30px rgba(255, 215, 0, 0.05),
                inset 0 1px 0 rgba(255, 215, 0, 0.2);
        }

        .tile-number {
            font-family: 'Orbitron', monospace;
            font-size: clamp(38px, 8vw, 82px);
            font-weight: 900;
            color: #fff;
            text-shadow:
                0 0 20px rgba(255, 215, 0, 0.15),
                0 0 60px rgba(255, 215, 0, 0.05);
            line-height: 1;
            position: relative;
            z-index: 1;
            transition: transform 0.15s ease;
        }

        /* ── Tile separator line ── */
        .tile::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 215, 0, 0.06);
            z-index: 0;
        }
        .tile::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg,
                rgba(255, 215, 0, 0.03) 0%,
                transparent 40%,
                transparent 60%,
                rgba(255, 215, 0, 0.03) 100%);
            border-radius: 16px;
            pointer-events: none;
        }

        .tile-label {
            font-size: clamp(11px, 1.2vw, 14px);
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 14px;
            font-weight: 500;
        }

        /* ── Colon separators ── */
        .timer-sep {
            font-family: 'Orbitron', monospace;
            font-size: clamp(30px, 6vw, 64px);
            font-weight: 900;
            color: rgba(255, 215, 0, 0.3);
            align-self: center;
            padding-bottom: 28px;
            animation: sepPulse 1s ease-in-out infinite;
            user-select: none;
        }
        @keyframes sepPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* ── Flip animation ── */
        .flip {
            animation: flipIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes flipIn {
            0% {
                transform: rotateX(90deg) scale(0.8);
                opacity: 0.3;
            }
            100% {
                transform: rotateX(0deg) scale(1);
                opacity: 1;
            }
        }

        /* ── Bottom message ── */
        .bottom-message {
            margin-top: 50px;
        }
        .bottom-message p {
            font-size: clamp(13px, 1.5vw, 17px);
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 2px;
        }
        .bottom-message .highlight {
            color: rgba(255, 215, 0, 0.7);
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* ── Progress bar ── */
        .progress-wrap {
            margin-top: 35px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b35, #ffd700);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        /* ── Particles ── */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ffd700;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 6s ease-in-out infinite;
            box-shadow: 0 0 6px #ffd700;
        }
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 1.2s; width: 2px; height: 2px; }
        .particle:nth-child(3) { left: 35%; animation-delay: 2.4s; }
        .particle:nth-child(4) { left: 50%; animation-delay: 0.6s; width: 4px; height: 4px; }
        .particle:nth-child(5) { left: 65%; animation-delay: 1.8s; }
        .particle:nth-child(6) { left: 75%; animation-delay: 3.0s; width: 2px; height: 2px; }
        .particle:nth-child(7) { left: 85%; animation-delay: 0.3s; }
        .particle:nth-child(8) { left: 95%; animation-delay: 1.5s; }
        .particle:nth-child(9) { left: 45%; animation-delay: 2.1s; }
        .particle:nth-child(10) { left: 5%; animation-delay: 3.6s; width: 2px; height: 2px; }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            20% {
                opacity: 0.8;
            }
            80% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ── Hype Button ── */
        .hype-wrap {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .hype-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            position: relative;
            background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,107,53,0.12));
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 60px;
            padding: 14px 36px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: clamp(16px,2vw,22px);
            font-weight: 700;
            color: #ffd700;
            transition: all .3s ease;
            box-shadow: 0 0 20px rgba(255,215,0,0.05);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .hype-btn:hover {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,107,53,0.2));
            border-color: rgba(255,215,0,0.5);
            box-shadow: 0 0 40px rgba(255,215,0,0.15);
            transform: scale(1.05);
        }
        .hype-btn:active { transform: scale(0.95); }
        .hype-btn .fire {
            font-size: clamp(20px,2.5vw,28px);
            transition: transform .2s ease;
        }
        .hype-btn:hover .fire { transform: scale(1.3) rotate(-10deg); }
        .hype-count {
            font-family: 'Orbitron', monospace;
            font-size: clamp(14px,1.8vw,20px);
            font-weight: 700;
            color: #fff;
            min-width: 30px;
            text-align: center;
        }
        .hype-label {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
        }
        .hype-burst {
            animation: hypeBurst .6s cubic-bezier(.34,1.56,.64,1) forwards;
        }
        @keyframes hypeBurst {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .spark {
            position: absolute;
            pointer-events: none;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #ffd700;
            opacity: 0;
        }
        .spark.fly {
            animation: sparkFly .8s ease-out forwards;
        }
        @keyframes sparkFly {
            0% { opacity: 1; transform: translate(0,0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .countdown-container { padding: 30px 16px; }
            .timer-sep { padding-bottom: 22px; }
            .tile { width: clamp(68px, 20vw, 90px); height: clamp(78px, 22vw, 100px); border-radius: 12px; }
            .tile-number { font-size: clamp(30px, 12vw, 44px); }
            .badge { font-size: 11px; padding: 6px 16px 6px 12px; }
            .hype-btn { padding: 12px 24px; }
        }
    </style>
</head>
<body>

    <!-- Background layers -->
    <div class="bg-grid"></div>
    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <div class="scan-line"></div>

    <!-- Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Main -->
    <div class="countdown-container">

        <div class="badge">
            <span class="dot"></span>
            <span>Launch countdown</span>
        </div>

        <h1 class="title">Something Epic Is Coming</h1>
        <p class="subtitle">We're launching in <span>just around the corner</span></p>

        <div class="timer" id="timer">
            <div class="timer-unit">
                <div class="tile" id="daysTile">
                    <span class="tile-number" id="days">00</span>
                </div>
                <span class="tile-label">Days</span>
            </div>
            <span class="timer-sep">:</span>
            <div class="timer-unit">
                <div class="tile" id="hoursTile">
                    <span class="tile-number" id="hours">00</span>
                </div>
                <span class="tile-label">Hours</span>
            </div>
            <span class="timer-sep">:</span>
            <div class="timer-unit">
                <div class="tile" id="minutesTile">
                    <span class="tile-number" id="minutes">00</span>
                </div>
                <span class="tile-label">Minutes</span>
            </div>
            <span class="timer-sep">:</span>
            <div class="timer-unit">
                <div class="tile" id="secondsTile">
                    <span class="tile-number" id="seconds">00</span>
                </div>
                <span class="tile-label">Seconds</span>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-label">
                <span>Preparing launch</span>
                <span id="progressPct">0%</span>
            </div>
        </div>

        <div class="bottom-message">
            <p>🚀 &nbsp; Get ready &nbsp; · &nbsp; <span class="highlight">#HYPED</span> &nbsp; · &nbsp; Stay tuned</p>
        </div>

        <!-- HYPE BUTTON -->
        <div class="hype-wrap">
            <button class="hype-btn" id="hypeBtn">
                <span class="fire">🔥</span>
                <span>HYPE</span>
                <span class="hype-count" id="hypeCount">0</span>
            </button>
            <div class="hype-label">Click if you're hyped!</div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            const COUNTDOWN_KEY = 'epic_launch_countdown_start';

            // ── Get or set start time ──
            let startTime = localStorage.getItem(COUNTDOWN_KEY);
            if (!startTime) {
                startTime = Date.now();
                try { localStorage.setItem(COUNTDOWN_KEY, startTime); } catch(e) {}
            } else {
                startTime = parseInt(startTime, 10);
            }

            const TOTAL_DURATION = 2 * 24 * 60 * 60 * 1000; // 2 days
            const endTime = startTime + TOTAL_DURATION;

            // ── DOM refs ──
            const daysEl   = document.getElementById('days');
            const hoursEl  = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const fillBar  = document.getElementById('progressFill');
            const pctEl    = document.getElementById('progressPct');

            let prev = { days: -1, hours: -1, minutes: -1, seconds: -1 };

            function pad(n) {
                return String(n).padStart(2, '0');
            }

            function tick() {
                const now = Date.now();
                let diff = endTime - now;
                if (diff < 0) diff = 0;

                const totalSec = Math.floor(diff / 1000);
                const d = Math.floor(totalSec / 86400);
                const h = Math.floor((totalSec % 86400) / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                const s = totalSec % 60;

                daysEl.textContent = pad(d);
                hoursEl.textContent = pad(h);
                minutesEl.textContent = pad(m);
                secondsEl.textContent = pad(s);

                if (prev.days !== -1) {
                    if (d !== prev.days)   daysEl.classList.remove('flip');
                    if (h !== prev.hours)  hoursEl.classList.remove('flip');
                    if (m !== prev.minutes) minutesEl.classList.remove('flip');
                    if (s !== prev.seconds) secondsEl.classList.remove('flip');
                    void daysEl.offsetWidth;
                    if (d !== prev.days)   daysEl.classList.add('flip');
                    if (h !== prev.hours)  hoursEl.classList.add('flip');
                    if (m !== prev.minutes) minutesEl.classList.add('flip');
                    if (s !== prev.seconds) secondsEl.classList.add('flip');
                }

                prev = { days: d, hours: h, minutes: m, seconds: s };

                const elapsed = now - startTime;
                let pct = (elapsed / TOTAL_DURATION) * 100;
                if (pct > 100) pct = 100;
                fillBar.style.width = pct + '%';
                pctEl.textContent = Math.round(pct) + '%';
            }

            tick();
            setInterval(tick, 1000);

            /* ── HYPE BUTTON ── */
            const HYPE_KEY = 'cdo_hype_count';
            const hypeBtn = document.getElementById('hypeBtn');
            const hypeCountEl = document.getElementById('hypeCount');

            function getHypeCount() {
                try { return parseInt(localStorage.getItem(HYPE_KEY), 10) || 0; } catch(e) { return 0; }
            }
            function setHypeCount(n) {
                try { localStorage.setItem(HYPE_KEY, n); } catch(e) {}
            }

            hypeCountEl.textContent = getHypeCount();

            hypeBtn.addEventListener('click', function(e) {
                let count = getHypeCount();
                count++;
                setHypeCount(count);
                hypeCountEl.textContent = count;

                hypeBtn.classList.remove('hype-burst');
                void hypeBtn.offsetWidth;
                hypeBtn.classList.add('hype-burst');

                const rect = hypeBtn.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                for (let i = 0; i < 8; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'spark';
                    const angle = (i / 8) * Math.PI * 2;
                    const dist = 60 + Math.random() * 40;
                    spark.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                    spark.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                    spark.style.left = cx + 'px';
                    spark.style.top = cy + 'px';
                    document.body.appendChild(spark);
                    void spark.offsetWidth;
                    spark.classList.add('fly');
                    setTimeout(() => spark.remove(), 800);
                }

                if (navigator.vibrate) navigator.vibrate(15);
            });
        })();
    </script>

</body>
</html>
